<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 64 64" role="img" aria-label="Nisrine Bedri">
  <defs>
    <clipPath id="circle">
      <circle cx="32" cy="32" r="32" />
    </clipPath>
  </defs>
  <!-- Same photo as the site avatar; circular crop for the browser tab -->
  <image
    width="64"
    height="64"
    clip-path="url(#circle)"
    preserveAspectRatio="xMidYMid slice"
    href="images/profile.jpg"
    xlink:href="images/profile.jpg"
  />
</svg>
